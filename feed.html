<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked - Feed</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/pages/feed.css">

    <style>
        [x-cloak] {
            display: none !important;
        }

        @media (min-width: 1024px) {
            .sidebar {
                display: block !important;
            }
        }

        .mobile-nav {
            display: flex !important;
        }

        /* FIX: Estilo para like activo */
        .action-btn.active {
            color: #ef4444;
        }

        .action-btn.active span:first-child {
            filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.5));
        }
    </style>
</head>

<body x-data="feedApp()" x-cloak>

    <!-- Header -->
    <header class="nav-header">
        <div class="container nav-container">
            <a href="feed.html" class="logo">
                <div class="logo-icon">🎣</div>
                <span>Hooked</span>
            </a>

            <nav class="nav-links" x-show="user || isInitialized">
                <a href="feed.html" class="nav-link active">Inicio</a>
                <a href="perfil.html" class="nav-link">Perfil</a>
                <button class="theme-toggle" onclick="Utils.toggleTheme(); this.textContent = Utils.getThemeIcon()"
                    title="Cambiar tema">
                    ☀️
                </button>
                <button @click="logout()" class="btn btn-ghost btn-sm">Salir</button>
            </nav>
        </div>
    </header>

    <div class="container layout layout-sidebar pb-safe">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-user">
                <div class="avatar">
                    <template x-if="user?.fotoPerfil">
                        <img :src="user.fotoPerfil" :alt="user.nombre">
                    </template>
                    <template x-if="!user?.fotoPerfil">
                        <span x-text="user?.nombre?.charAt(0)?.toUpperCase() || '?'"></span>
                    </template>
                </div>
                <div class="sidebar-user-info">
                    <div class="sidebar-user-name" x-text="user?.nombre || 'Cargando...'"></div>
                    <div class="sidebar-user-email" x-text="user?.email || ''" x-show="user?.email"></div>
                </div>
            </div>

            <div class="sidebar-card">
                <div class="sidebar-title">Categorías</div>

                <div class="trending-item" @click.prevent="filterByCategory('todo')">
                    <div class="trending-rank" style="background: var(--accent-ocean); color: white;">#</div>
                    <div class="trending-info">
                        <div class="trending-name">Todas</div>
                    </div>
                </div>

                <template x-for="cat in (categorias || [])" :key="cat.id">
                    <div class="trending-item" @click.prevent="filterByCategory(cat.id)">
                        <div class="trending-rank" x-text="cat.id"></div>
                        <div class="trending-info">
                            <div class="trending-name" x-text="cat.nombre"></div>
                            <div class="trending-count" x-text="cat.descripcion || ''"></div>
                        </div>
                    </div>
                </template>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Loading -->
            <template x-if="loading && posts.length === 0">
                <div>
                    <div class="loading-skeleton">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-lines">
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line" style="width: 30%;"></div>
                            </div>
                        </div>
                        <div class="skeleton-image"></div>
                    </div>
                    <div class="loading-skeleton" style="margin-top: 1rem;">
                        <div class="skeleton-header">
                            <div class="skeleton-avatar"></div>
                            <div class="skeleton-lines">
                                <div class="skeleton-line short"></div>
                                <div class="skeleton-line" style="width: 30%;"></div>
                            </div>
                        </div>
                        <div class="skeleton-image"></div>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <div class="empty-state" x-show="!loading && posts.length === 0">
                <div class="empty-state-icon">🎣</div>
                <h3 style="margin-bottom: 0.5rem; color: var(--text-primary);">No hay capturas aún</h3>
                <p style="margin-bottom: 1.5rem;">Sé el primero en compartir tu experiencia</p>
                <a href="crear-post.html" class="btn btn-primary">Crear primer post</a>
            </div>

            <!-- Posts -->
            <!-- FIX: :key único que incluye el estado liked para forzar re-render -->
            <div class="feed-grid" x-show="!loading && posts.length > 0">
                <template x-for="post in (posts || [])" :key="post.id">
                    <article class="post-card animate-fade-in">

                        <!-- Header -->
                        <div class="post-header">
                            <div class="avatar">
                                <template x-if="post.usuario && post.usuario.foto_perfil">
                                    <img :src="post.usuario.foto_perfil" :alt="post.usuario.nombre || 'Usuario'">
                                </template>
                                <template x-if="!(post.usuario && post.usuario.foto_perfil)">
                                    <span
                                        x-text="((post.usuario && post.usuario.nombre) || '?').charAt(0).toUpperCase()"></span>
                                </template>
                            </div>
                            <div class="post-meta">
                                <a :href="'perfil.html?id=' + (post.usuario ? post.usuario.id : '')" class="post-author"
                                    x-text="(post.usuario && post.usuario.nombre) || 'Usuario'"></a>
                                <div class="post-time" x-text="formatDate(post.fecha_creacion)"></div>
                            </div>
                            <span class="post-category"
                                x-text="(post.categoria && post.categoria.nombre) || 'General'"></span>
                        </div>

                        <!-- Imagen del post -->
                        <template x-if="post.foto_link">
                            <img :src="post.foto_link" class="post-image" :alt="post.titulo || 'Imagen'" loading="lazy"
                                style="cursor: pointer;" @click="abrirLightbox(post)">
                        </template>

                        <!-- Contenido -->
                        <div class="post-content">
                            <h3 class="post-title" x-text="post.titulo || 'Sin título'"></h3>
                            <p class="post-text" x-text="post.contenido || ''"></p>
                        </div>

                        <!-- Acciones - FIX: Forzar actualización visual con x-effect -->
                        <div class="post-actions">
                            <button class="action-btn" :class="{ 'active': post.liked === true }"
                                @click="toggleLike(post)" :disabled="!post.id">
                                <span x-text="post.liked === true ? '❤️' : '🤍'"></span>
                                <span x-text="post.like_count || 0"></span>
                            </button>

                            <a :href="'post.html?id=' + (post.id || '')" class="action-btn">
                                <span>💬</span>
                                <span x-text="(post.comentarios_count || 0) + ' comentarios'">Comentar</span>
                            </a>

                            <button class="action-btn" @click="sharePost(post)">
                                <span>🔗</span>
                                <span>Compartir</span>
                            </button>
                        </div>
                    </article>
                </template>
            </div>

            <!-- Load More -->
            <div style="text-align: center; padding: 2rem;" x-show="!loading && hasMorePosts && posts.length > 0">
                <button @click="loadMore()" class="btn btn-secondary" :disabled="loadingMore">
                    <span x-show="!loadingMore">Cargar más</span>
                    <span x-show="loadingMore">Cargando...</span>
                </button>
            </div>

        </main>
    </div>

    <!-- Mobile nav -->
    <nav class="mobile-nav">
        <a href="feed.html" class="mobile-nav-link active">🏠<span>Inicio</span></a>
        <a href="crear-post.html" class="mobile-nav-link">➕<span>Crear</span></a>
        <a href="perfil.html" class="mobile-nav-link">👤<span>Perfil</span></a>
    </nav>

    <div class="toast-container" x-data="{ toasts: [] }"
        @toast.window="toasts.push($event.detail); setTimeout(() => toasts.shift(), 3000)">
        <template x-for="toast in toasts" :key="toast.message">
            <div class="toast" :class="toast.type" x-text="toast.message"></div>
        </template>
    </div>

    <!-- Lightbox de comentarios -->
    <div class="lightbox-overlay" x-show="lightbox.abierto" x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0" @click.self="cerrarLightbox()" @keydown.escape.window="cerrarLightbox()"
        x-cloak>
        <div class="lightbox-container">

            <!-- Botón cerrar -->
            <button class="lightbox-close" @click="cerrarLightbox()">✕</button>

            <!-- Imagen -->
            <div class="lightbox-imagen">
                <img :src="lightbox.post?.foto_link" :alt="lightbox.post?.titulo" class="lightbox-img">
            </div>

            <!-- Panel derecho -->
            <div class="lightbox-panel">

                <!-- Header autor -->
                <div class="lightbox-autor">
                    <div class="avatar avatar-sm">
                        <template x-if="lightbox.post?.usuario?.foto_perfil">
                            <img :src="lightbox.post.usuario.foto_perfil" :alt="lightbox.post.usuario.nombre">
                        </template>
                        <template x-if="!lightbox.post?.usuario?.foto_perfil">
                            <span x-text="(lightbox.post?.usuario?.nombre || '?').charAt(0).toUpperCase()"></span>
                        </template>
                    </div>
                    <div>
                        <div class="lightbox-autor-nombre" x-text="lightbox.post?.usuario?.nombre"></div>
                        <div class="lightbox-autor-fecha" x-text="formatDate(lightbox.post?.fecha_creacion)"></div>
                    </div>
                    <span class="post-category" x-text="lightbox.post?.categoria?.nombre"></span>
                </div>

                <!-- Contenido -->
                <div class="lightbox-contenido">
                    <h3 class="lightbox-titulo" x-text="lightbox.post?.titulo"></h3>
                    <p class="lightbox-texto" x-text="lightbox.post?.contenido"></p>
                </div>

                <!-- Acciones -->
                <div class="lightbox-acciones">
                    <button class="action-btn" :class="{ 'active': lightbox.post?.liked }"
                        @click="toggleLikeLightbox()">
                        <span x-text="lightbox.post?.liked ? '❤️' : '🤍'"></span>
                        <span x-text="lightbox.post?.like_count || 0"></span>
                    </button>
                    <div class="action-btn">
                        <span>💬</span>
                        <span x-text="(lightbox.comentarios?.length || 0) + ' comentarios'"></span>
                    </div>
                    <button class="action-btn" @click="sharePost(lightbox.post)">
                        <span>🔗</span>
                        <span>Compartir</span>
                    </button>
                    <a :href="'post.html?id=' + lightbox.post?.id" class="action-btn">
                        <span>↗</span>
                        <span>Ver post</span>
                    </a>
                </div>

                <!-- Comentarios -->
                <div class="lightbox-comentarios">

                    <!-- Loading -->
                    <template x-if="lightbox.loadingComentarios">
                        <div class="lightbox-loading">Cargando comentarios...</div>
                    </template>

                    <!-- Lista -->
                    <div class="lightbox-comentarios-lista" x-show="!lightbox.loadingComentarios">
                        <template x-if="lightbox.comentarios.length === 0">
                            <p class="lightbox-sin-comentarios">Sé el primero en comentar 🎣</p>
                        </template>
                        <template x-for="comentario in lightbox.comentarios" :key="comentario.id">
                            <div class="lightbox-comentario">
                                <div class="avatar avatar-xs">
                                    <template x-if="comentario.autor?.fotoPerfil">
                                        <img :src="comentario.autor.fotoPerfil" :alt="comentario.autor.nombre">
                                    </template>
                                    <template x-if="!comentario.autor?.fotoPerfil">
                                        <span x-text="(comentario.autor?.nombre || '?').charAt(0).toUpperCase()"></span>
                                    </template>
                                </div>
                                <div class="lightbox-comentario-cuerpo">
                                    <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                                        <span class="lightbox-comentario-autor"
                                            x-text="comentario.autor?.nombre"></span>
                                        <template x-if="esPropioLightbox(comentario)">
                                            <div style="display:flex; gap:0.25rem; margin-left:auto;">
                                                <button class="btn-accion-comentario btn-editar"
                                                    @click="editarComentarioLightbox(comentario)"
                                                    title="Editar">✏️</button>
                                                <button class="btn-accion-comentario btn-eliminar"
                                                    @click="eliminarComentarioLightbox(comentario)"
                                                    title="Eliminar">🗑️</button>
                                            </div>
                                        </template>
                                    </div>
                                    <template x-if="lightbox.comentarioEditando?.id !== comentario.id">
                                        <p class="lightbox-comentario-texto" x-text="comentario.contenido"></p>
                                    </template>
                                    <template x-if="lightbox.comentarioEditando?.id === comentario.id">
                                        <div
                                            style="display:flex; flex-direction:column; gap:0.5rem; margin-top:0.25rem;">
                                            <textarea class="lightbox-textarea" x-model="lightbox.textoEditando"
                                                rows="2" maxlength="500"></textarea>
                                            <div style="display:flex; gap:0.5rem; justify-content:flex-end;">
                                                <button class="btn btn-ghost btn-sm"
                                                    @click="cancelarEdicionLightbox()">Cancelar</button>
                                                <button class="btn btn-primary btn-sm"
                                                    @click="guardarEdicionLightbox()">Guardar</button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>

                    <!-- Formulario nuevo comentario -->
                    <div class="lightbox-nuevo-comentario">
                        <div class="avatar avatar-xs">
                            <template x-if="user?.fotoPerfil">
                                <img :src="user.fotoPerfil" :alt="user.nombre">
                            </template>
                            <template x-if="!user?.fotoPerfil">
                                <span x-text="(user?.nombre || '?').charAt(0).toUpperCase()"></span>
                            </template>
                        </div>
                        <div class="lightbox-input-wrap">
                            <textarea class="lightbox-textarea" x-model="lightbox.nuevoComentario"
                                placeholder="Escribe un comentario... 🎣" rows="2" maxlength="500"
                                @keydown.ctrl.enter="enviarComentarioLightbox()"></textarea>
                            <button class="btn btn-primary btn-sm" @click="enviarComentarioLightbox()"
                                :disabled="!lightbox.nuevoComentario.trim() || lightbox.enviando">
                                <span x-show="!lightbox.enviando">Comentar</span>
                                <span x-show="lightbox.enviando">...</span>
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/feed.js"></script>
    <script>Utils.initTheme(); document.querySelector('.theme-toggle').textContent = Utils.getThemeIcon();</script>
</body>

</html>
